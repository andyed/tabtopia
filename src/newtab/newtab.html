<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Histospire</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="header">
    <div class="logo-container">
      <div class="menu-container">
        <button id="menuButton" class="menu-button">
          <svg width="24" height="24" viewBox="0 0 24 24">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        </button>
        <div id="menuDropdown" class="menu-dropdown">
          <div class="menu-group">
            <button class="menu-item" data-type="time" data-value="3600">Last Hour</button>
            <button class="menu-item" data-type="time" data-value="86400">Last Day</button>
            <button class="menu-item" data-type="time" data-value="604800">Last Week</button>
          </div>
          <div class="menu-group">
            <button class="menu-item" data-type="count" data-value="200">200 Events</button>
            <button class="menu-item" data-type="count" data-value="1000">1000 Events</button>
            <button class="menu-item" data-type="count" data-value="10000">10000 Events</button>
          </div>
        </div>
      </div>
      <div id="title">Histospire</div>
    </div>
  </div>
  <div id="readout-container">
    <span id="default-stats">
      <span id="total-history-items"></span>
      <span id="total-active-tabs"></span>
      <span id="total-edges"></span>
      <span id="average-edges-connected"></span>
      <span id="total-sessions"></span>
    </span>
    <span id="tooltip-info" style="display: none;"></span>
  </div>
  <div class="visualization-container">
    <div id="timeline-container">
      <svg id="timeline-svg"></svg>
    </div>
    <div id="graph-container">
      <svg id="graph-svg"></svg>
    </div>
  </div>
  <!-- Use local D3.js instead of CDN -->
  <script src="../lib/d3.min.js"></script>
  <script type="module" src="utility.js"></script>
  <script type="module" src="d3-visualizations.js"></script>
  <script type="module" src="newtab.js"></script>
</body>
</html>
