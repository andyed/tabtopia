<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Histospire</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div class="logo">tabtopia</div>
    <div class="header-controls">
      <button class="view-toggle" title="Toggle view">
        <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  stroke-width="2"  
        stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-chart-treemap"
        style="transform(scale:2)"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" /><path d="M12 4v16" /><path d="M4 15h8" /><path d="M12 12h8" /><path d="M16 12v8" /><path d="M16 16h4" /></svg>
      </button>
      <div class="search-container">
        <input type="text" 
          id="tabSearch" 
          placeholder="Search tabs..." 
          class="search-input"
        />
      </div>
    </div>
  </header>
  <div class="visualization-container">
    <div id="treemap"></div>
    <div id="readout"></div>
  </div>

  <script src="../lib/d3.min.js"></script>
  <script src="../lib/lunr.min.js"></script>
  <script src="newtab.js" type="module"></script>
</body>
</html>
