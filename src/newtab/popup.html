<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabtopia</title>
    <!-- Self-hosted Barlow Condensed (was render-blocking Google Fonts). -->
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="popup_styles.css">
    <link rel="stylesheet" href="popup_identity.css">
</head>
<body>
    <div class="popup-container">
        <header class="popup-header">
            <div class="logo">Tabtopia</div>
            <div class="header-controls">
                <div class="search-container">
                    <input type="text" id="popupSearch" class="search-input" placeholder="Search tabs...">
                </div>
            </div>
        </header>
        
        <div class="status-bar">
            <span id="tabCount" class="status-item">0 tabs</span>
            <span id="windowCount" class="status-item">0 windows</span>
        </div>
        
        <div id="popup-treemap" class="popup-treemap"></div>
        <div id="tooltip" class="tooltip"></div>
    </div>
    
    <script src="crash-suppression.js"></script>
    <script src="../lib/d3.min.js"></script>
    <script src="popup_script.js" type="module"></script>
</body>
</html>
