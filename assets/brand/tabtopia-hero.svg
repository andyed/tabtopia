  <text x="86" y="304" fill="#b9c9bf" font-family="Avenir Next, IBM Plex Sans, sans-serif" font-size="25" font-weight="600" letter-spacing="1.2">YOUR BROWSING, MAPPED</text>
  <path d="M86 348H456" stroke="#9ff7d2" stroke-width="4"/>
  <text x="86" y="400" fill="#f2ebd8" font-family="Avenir Next, IBM Plex Sans, sans-serif" font-size="24" font-weight="600">Recover the route, not just the page.</text>
  <text x="86" y="438" fill="#b9c9bf" font-family="Avenir Next, IBM Plex Sans, sans-serif" font-size="19" font-weight="600">Sessions become terrain. Domains become regions.</text>
  <text x="86" y="469" fill="#b9c9bf" font-family="Avenir Next, IBM Plex Sans, sans-serif" font-size="19" font-weight="600">Every return leaves a visible path.</text>
