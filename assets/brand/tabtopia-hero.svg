<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Tabtopia — your browsing, mapped</title>
  <desc id="desc">A dark information landscape of browsing sessions, routes, domains, and remembered pages.</desc>
